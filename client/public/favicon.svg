<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="LingoLeap Favicon">
  <defs>
    <!-- Sleek Green-to-Blue premium gradient -->
    <linearGradient id="favGrad" x1="10%" y1="90%" x2="90%" y2="10%">
      <stop offset="0%" stop-color="#22C55E" />
      <stop offset="50%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <!-- Soft backdrop fill for bubble -->
    <linearGradient id="favGradFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.06" />
    </linearGradient>
    <!-- Trail Gradient -->
    <linearGradient id="favTrailGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#60A5FA" />
    </linearGradient>
  </defs>

  <!-- ── Speech Bubble ── -->
  <path
    d="M 22,18 H 78 A 12,12 0 0 1 90,30 V 62 A 12,12 0 0 1 78,74 H 46 L 28,88 V 74 H 22 A 12,12 0 0 1 10,62 V 30 A 12,12 0 0 1 22,18 Z"
    fill="url(#favGradFill)"
    stroke="url(#favGrad)"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- ── Leaping Gecko Mascot (Lingo) ── -->
  <g>
    <!-- Spine & Curved Tail -->
    <path
      d="M 68,34 C 58,44 42,62 30,68 C 21,72 18,62 24,57 C 30,52 38,48 46,44"
      stroke="url(#favGrad)"
      stroke-width="5"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    
    <!-- Head -->
    <circle 
      cx="67" 
      cy="31" 
      r="7.5" 
      fill="url(#favGrad)" 
    />

    <!-- Curious eyes -->
    <circle cx="68" cy="27" r="3.5" fill="#FFFFFF" />
    <circle cx="69" cy="26.5" r="1.5" fill="#0F172A" />
    
    <!-- Smart Glasses -->
    <circle cx="68" cy="27" r="4.2" stroke="#FFFFFF" stroke-width="1" fill="none" />
    <path d="M 64.5,29 L 60,32" stroke="#FFFFFF" stroke-width="1.2" />

    <!-- Headphones -->
    <path
      d="M 60,33 A 8 8 0 0 1 72,25"
      stroke="#3B82F6"
      stroke-width="2.2"
      stroke-linecap="round"
      fill="none"
    />
    <rect x="58.5" y="31.5" width="2" height="4" rx="1" fill="#3B82F6" />
    <rect x="71" y="24" width="2" height="4" rx="1" fill="#3B82F6" />

    <!-- Front Left Arm -->
    <path
      d="M 62,35 C 57,32 50,31 46,29"
      stroke="url(#favGrad)"
      stroke-width="3.2"
      stroke-linecap="round"
      fill="none"
    />
    <!-- Front Right Arm -->
    <path
      d="M 69,36 C 75,39 80,36 84,33"
      stroke="url(#favGrad)"
      stroke-width="3.2"
      stroke-linecap="round"
      fill="none"
    />
    <circle cx="45" cy="29" r="1.8" fill="url(#favGrad)" />
    <circle cx="85" cy="32" r="1.8" fill="url(#favGrad)" />

    <!-- Back Left Leg -->
    <path
      d="M 45,46 C 42,54 36,58 32,60"
      stroke="url(#favGrad)"
      stroke-width="3"
      stroke-linecap="round"
      fill="none"
    />
    <!-- Back Right Leg -->
    <path
      d="M 52,43 C 57,48 58,54 60,60"
      stroke="url(#favGrad)"
      stroke-width="3"
      stroke-linecap="round"
      fill="none"
    />
    <circle cx="31" cy="61" r="1.6" fill="url(#favGrad)" />
    <circle cx="61" cy="61" r="1.6" fill="url(#favGrad)" />
  </g>

  <!-- ── Motion Trail ── -->
  <circle
    cx="32"
    cy="78"
    r="3"
    fill="url(#favTrailGrad)"
    opacity="0.6"
  />
  <circle
    cx="24"
    cy="84"
    r="2"
    fill="url(#favTrailGrad)"
    opacity="0.4"
  />
  <circle
    cx="18"
    cy="89"
    r="1.2"
    fill="url(#favTrailGrad)"
    opacity="0.2"
  />
</svg>